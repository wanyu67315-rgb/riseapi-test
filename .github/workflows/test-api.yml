name: Test API from US
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test 100 Concurrent
        run: |
          BASE_URL="https://api.riseapi.cc/v1"
          KEY="sk-ag-b871449955e59be4086fcdbec72d6ea0"
          
          echo "开始100并发测试..."
          START=$(date +%s%3N)
          
          for i in $(seq 1 100); do
            (
              T1=$(date +%s%3N)
              RES=$(curl -s "$BASE_URL/chat/completions" \
                -H "Authorization: Bearer $KEY" \
                -H "Content-Type: application/json" \
                -d "{\"model\":\"kimi-k2.5\",\"messages\":[{\"role\":\"user\",\"content\":\"$i+$i=?\"}],\"max_tokens\":5}" 2>/dev/null)
              T2=$(date +%s%3N)
              echo "$RES" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK $((T2-T1))ms')" 2>/dev/null || echo "ERR $((T2-T1))ms"
            ) &
          done | tee /tmp/results.txt
          
          wait
          END=$(date +%s%3N)
          
          OK=$(grep -c "^OK" /tmp/results.txt || echo 0)
          ERR=$(grep -c "^ERR" /tmp/results.txt || echo 0)
          AVG=$(grep "^OK" /tmp/results.txt | awk '{sum+=$2;count++} END {if(count>0) printf "%.0f", sum/count; else print "N/A"}')
          MIN=$(grep "^OK" /tmp/results.txt | awk '{print $2}' | sort -n | head -1)
          MAX=$(grep "^OK" /tmp/results.txt | awk '{print $2}' | sort -n | tail -1)
          
          echo "========================="
          echo "成功: $OK / 100"
          echo "失败: $ERR / 100"
          echo "最快: ${MIN}ms"
          echo "最慢: ${MAX}ms"
          echo "平均: ${AVG}ms"
          echo "总耗时: $((END-START))ms"
