name: Test API from US
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Multiple Models
        run: |
          BASE_URL="https://api.riseapi.cc/v1"
          KEY="sk-pgqijbiyebwnshqjllagrewnnnoqslmxmtojtutwreaphalk"
          
          MODELS=(
            "Pro/moonshotai/Kimi-K2.5"
            "deepseek-ai/DeepSeek-V3.2"
            "Qwen/Qwen3.5-122B-A10B"
            "Pro/zai-org/GLM-5"
            "Pro/MiniMaxAI/MiniMax-M2.5"
          )
          
          for MODEL in "${MODELS[@]}"; do
            echo -n "[$MODEL] "
            T1=$(date +%s%3N)
            RES=$(curl -s "$BASE_URL/chat/completions" \
              -H "Authorization: Bearer $KEY" \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hello\"}],\"max_tokens\":10}" 2>/dev/null)
            T2=$(date +%s%3N)
            STATUS=$(echo "$RES" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK: '+d['choices'][0]['message']['content'][:30])" 2>/dev/null || echo "ERR")
            echo "$STATUS | $((T2-T1))ms"
          done
